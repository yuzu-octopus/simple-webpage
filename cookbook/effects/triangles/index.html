<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Triangles</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; min-height: 100vh; align-items: center; background: #f5f5f5; }

    .triangle-up {
      width: 0; height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 35px solid #667eea;
    }

    .triangle-down {
      width: 0; height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 35px solid #764ba2;
    }

    .triangle-left {
      width: 0; height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-right: 35px solid #ee5a6f;
    }

    .speech-bubble {
      position: relative;
      background: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 20px;
      border: 8px solid transparent;
      border-top-color: white;
    }

    .label { text-align: center; font-size: 0.75rem; color: #999; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div>
    <div class="triangle-up"></div>
    <div class="label">Up</div>
  </div>
  <div>
    <div class="triangle-down"></div>
    <div class="label">Down</div>
  </div>
  <div>
    <div class="triangle-left"></div>
    <div class="label">Left</div>
  </div>
  <div>
    <div class="speech-bubble">Speech bubble</div>
  </div>
</body>
</html>
