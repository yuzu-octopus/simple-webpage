<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Animation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1a1a2e;
    }

    @property --angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    .animated-border {
      position: relative;
      background: #16213e;
      color: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
    }

    .animated-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: conic-gradient(from var(--angle), #667eea, #764ba2, #ee5a6f, #667eea);
      border-radius: inherit;
      z-index: -1;
      animation: rotate-border 3s linear infinite;
    }

    .animated-border::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #16213e;
      border-radius: inherit;
      z-index: -1;
    }

    .animated-border h2 { margin-bottom: 0.5rem; }
    .animated-border p { opacity: 0.8; line-height: 1.6; }

    @keyframes rotate-border {
      to { --angle: 360deg; }
    }
  </style>
</head>
<body>
  <div class="animated-border">
    <h2>Animated Border</h2>
    <p>Rotating gradient border using <code>@property</code> to animate a custom CSS property and <code>conic-gradient</code>.</p>
  </div>
</body>
</html>
