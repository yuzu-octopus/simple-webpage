<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Snap Carousel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 1rem;
      padding-bottom: 1rem;
    }

    .carousel-card {
      flex: 0 0 80%;
      scroll-snap-align: start;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 12px;
      padding: 2rem;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    @media (min-width: 768px) {
      .carousel-card { flex: 0 0 40%; }
    }

    .carousel-card h3 { margin-bottom: 0.5rem; }
    .carousel-card p { opacity: 0.9; }

    /* Scrollbar styling */
    .carousel::-webkit-scrollbar { height: 6px; }
    .carousel::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    .carousel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
  <h1 style="margin-bottom: 1rem;">Scroll Snap Carousel</h1>
  <div class="carousel">
    <div class="carousel-card"><h3>Card 1</h3><p>Swipe to see more. Each card snaps to the start.</p></div>
    <div class="carousel-card"><h3>Card 2</h3><p>scroll-snap-type: x mandatory ensures clean snapping.</p></div>
    <div class="carousel-card"><h3>Card 3</h3><p>scroll-snap-align: start defines the snap point.</p></div>
    <div class="carousel-card"><h3>Card 4</h3><p>No JavaScript needed for basic carousel behavior.</p></div>
  </div>
</body>
</html>
