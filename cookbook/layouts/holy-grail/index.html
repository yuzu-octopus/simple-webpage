<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holy Grail Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    header { background: #1a1a2e; color: white; padding: 1rem 1.5rem; }
    footer { background: #1a1a2e; color: #999; padding: 1rem 1.5rem; text-align: center; font-size: 0.875rem; }

    .content { display: flex; }
    .sidebar { width: 200px; background: #f0f0f0; padding: 1rem; flex-shrink: 0; }
    .main { flex: 1; padding: 1.5rem; }

    @media (max-width: 768px) {
      .content { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <header><strong>Holy Grail</strong></header>
  <div class="content">
    <aside class="sidebar">
      <nav>
        <a href="#" style="display:block; padding:0.5rem 0; color:#333; text-decoration:none;">Link 1</a>
        <a href="#" style="display:block; padding:0.5rem 0; color:#333; text-decoration:none;">Link 2</a>
        <a href="#" style="display:block; padding:0.5rem 0; color:#333; text-decoration:none;">Link 3</a>
      </nav>
    </aside>
    <main class="main">
      <h1>Main Content</h1>
      <p style="margin-top:1rem; color:#666;">Classic header/sidebar/main/footer layout. Sidebar collapses on mobile.</p>
    </main>
  </div>
  <footer>© 2026 Holy Grail Layout</footer>
</body>
</html>
