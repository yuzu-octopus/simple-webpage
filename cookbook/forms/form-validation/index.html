<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 400px; margin: 0 auto; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.375rem; font-weight: 500; font-size: 0.875rem; }
    .form-group input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    .form-group input:focus { outline: 2px solid #667eea; outline-offset: -1px; border-color: transparent; }
    .form-group input.valid { border-color: #16a34a; }
    .form-group input.invalid { border-color: #dc2626; }
    .error { color: #dc2626; font-size: 0.8rem; margin-top: 0.25rem; display: none; }
    .error.show { display: block; }
    .btn { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1 style="margin-bottom: 1.5rem;">Form Validation</h1>
  <form id="form" novalidate>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email">
      <span class="error" id="email-error">Enter a valid email</span>
    </div>
    <div class="form-group">
      <label for="password">Password (min 8 chars)</label>
      <input type="password" id="password" autocomplete="new-password">
      <span class="error" id="password-error">Min 8 characters</span>
    </div>
    <button type="submit" class="btn">Submit</button>
  </form>
  <script>
    const form = document.getElementById('form');
    function validate(id, test) {
      const input = document.getElementById(id);
      const error = document.getElementById(id + '-error');
      const valid = test(input.value);
      input.classList.toggle('valid', valid);
      input.classList.toggle('invalid', !valid);
      error.classList.toggle('show', !valid);
      return valid;
    }
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const a = validate('email', v => v.includes('@'));
      const b = validate('password', v => v.length >= 8);
      if (a && b) alert('Valid!');
    });
    document.getElementById('email').addEventListener('blur', () => validate('email', v => v.includes('@')));
    document.getElementById('password').addEventListener('blur', () => validate('password', v => v.length >= 8));
  </script>
</body>
</html>
