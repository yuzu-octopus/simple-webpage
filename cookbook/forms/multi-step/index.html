<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 450px; margin: 0 auto; }

    .progress { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .progress-dot { flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; }
    .progress-dot.active { background: #667eea; }

    .step { display: none; }
    .step.active { display: block; }
    .step h2 { margin-bottom: 1rem; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.375rem; font-weight: 500; font-size: 0.875rem; }
    .form-group input { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }

    .btn-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn { padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; border: none; }
    .btn-primary { background: #667eea; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
  </style>
</head>
<body>
  <div class="progress">
    <div class="progress-dot active" id="dot1"></div>
    <div class="progress-dot" id="dot2"></div>
    <div class="progress-dot" id="dot3"></div>
  </div>

  <div class="step active" id="step1">
    <h2>Step 1: Name</h2>
    <div class="form-group"><label>First Name</label><input type="text"></div>
    <div class="form-group"><label>Last Name</label><input type="text"></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="goTo(2)">Next</button></div>
  </div>

  <div class="step" id="step2">
    <h2>Step 2: Contact</h2>
    <div class="form-group"><label>Email</label><input type="email"></div>
    <div class="form-group"><label>Phone</label><input type="tel"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(1)">Back</button>
      <button class="btn btn-primary" onclick="goTo(3)">Next</button>
    </div>
  </div>

  <div class="step" id="step3">
    <h2>Step 3: Confirm</h2>
    <p style="color: #666; margin-bottom: 1.5rem;">Review your information and submit.</p>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goTo(2)">Back</button>
      <button class="btn btn-primary" onclick="alert('Submitted!')">Submit</button>
    </div>
  </div>

  <script>
    function goTo(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      document.querySelectorAll('.progress-dot').forEach((d, i) => d.classList.toggle('active', i < n));
    }
  </script>
</body>
</html>
