<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: #f5f5f5; }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 320px;
      width: 90%;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0 auto 1rem;
      display: grid;
      place-items: center;
      color: white;
      font-size: 2rem;
      font-weight: 700;
    }

    .profile-card h2 { margin-bottom: 0.25rem; }
    .profile-card .role { color: #667eea; font-size: 0.875rem; margin-bottom: 1rem; }
    .profile-card p { color: #666; line-height: 1.6; font-size: 0.875rem; }

    .profile-actions { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.25rem; }
    .btn { padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; }
    .btn-primary { background: #667eea; color: white; }
    .btn-secondary { background: transparent; color: #667eea; border: 1px solid #667eea; }
  </style>
</head>
<body>
  <div class="profile-card">
    <div class="avatar">A</div>
    <h2>Alex Chen</h2>
    <div class="role">Frontend Developer</div>
    <p>Building beautiful interfaces with vanilla HTML, CSS, and JavaScript.</p>
    <div class="profile-actions">
      <button class="btn btn-primary">Follow</button>
      <button class="btn btn-secondary">Message</button>
    </div>
  </div>
</body>
</html>
