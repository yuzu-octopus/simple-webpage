<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: #f5f5f5; }

    .pricing-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 320px;
      width: 90%;
      text-align: center;
      position: relative;
    }

    .pricing-card.featured {
      border: 2px solid #667eea;
    }
    .pricing-card.featured::before {
      content: 'Popular';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #667eea;
      color: white;
      padding: 0.25rem 1rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .pricing-card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .price { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
    .price span { font-size: 1rem; font-weight: 400; color: #999; }

    .features { list-style: none; text-align: left; margin-bottom: 1.5rem; }
    .features li { padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; color: #555; font-size: 0.9rem; }
    .features li::before { content: '✓ '; color: #667eea; font-weight: 700; }

    .btn { width: 100%; padding: 0.75rem; border-radius: 6px; font-size: 1rem; cursor: pointer; border: none; }
    .btn-primary { background: #667eea; color: white; }
    .btn-outline { background: transparent; color: #667eea; border: 1px solid #667eea; }
  </style>
</head>
<body>
  <div class="pricing-card featured">
    <h2>Pro</h2>
    <div class="price">$29<span>/mo</span></div>
    <ul class="features">
      <li>Unlimited projects</li>
      <li>Priority support</li>
      <li>Custom domains</li>
      <li>Analytics dashboard</li>
    </ul>
    <button class="btn btn-primary">Get Started</button>
  </div>
</body>
</html>
