<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: #f5f5f5; }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 280px;
      width: 90%;
    }

    .product-image {
      height: 200px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: grid;
      place-items: center;
      color: white;
      font-size: 3rem;
    }

    .product-info { padding: 1.25rem; }
    .product-info h2 { font-size: 1.125rem; margin-bottom: 0.25rem; }
    .product-info .price { color: #667eea; font-weight: 700; font-size: 1.25rem; margin-bottom: 0.75rem; }
    .product-info p { color: #666; font-size: 0.875rem; line-height: 1.5; margin-bottom: 1rem; }

    .btn { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <div class="product-card">
    <div class="product-image">🎧</div>
    <div class="product-info">
      <h2>Wireless Headphones</h2>
      <div class="price">$79.99</div>
      <p>Premium sound quality with 30-hour battery life and noise cancellation.</p>
      <button class="btn">Add to Cart</button>
    </div>
  </div>
</body>
</html>
