<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Header</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }

    header {
      position: sticky;
      top: 0;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: white;
      padding: 0 1.5rem;
      height: 3.5rem;
      display: flex;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    main { padding: 2rem; max-width: 600px; margin: 0 auto; }
    .spacer { height: 150vh; background: linear-gradient(to bottom, #f5f5f5, #e0e0e0); padding: 2rem; }
    p { color: #666; line-height: 1.6; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header><strong>Sticky Header</strong></header>
  <main>
    <h1>Sticky Header</h1>
    <p>Uses <code>position: sticky</code> with <code>top: 0</code>. The header stays visible while scrolling. Backdrop blur adds a frosted glass effect.</p>
    <p>Scroll down to see it in action.</p>
  </main>
  <div class="spacer">
    <p>Keep scrolling...</p>
  </div>
</body>
</html>
