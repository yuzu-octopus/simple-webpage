<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: #1a1a2e;
      color: #ccc;
      padding: 1.5rem 0;
      flex-shrink: 0;
    }

    .sidebar-section { margin-bottom: 1.5rem; }
    .sidebar-label { padding: 0 1.5rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 0.5rem; }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #ccc;
      text-decoration: none;
      padding: 0.625rem 1.5rem;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .sidebar a:hover { background: rgba(255,255,255,0.08); color: white; }
    .sidebar a.active { background: rgba(102, 126, 234, 0.2); color: #667eea; }

    .main { flex: 1; padding: 2rem; background: #f5f5f5; }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <a href="#" class="active">📊 Dashboard</a>
      <a href="#">📈 Analytics</a>
      <a href="#">💰 Revenue</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Settings</div>
      <a href="#">👤 Profile</a>
      <a href="#">⚙️ Preferences</a>
      <a href="#">🔒 Security</a>
    </div>
  </aside>
  <main class="main">
    <h1>Sidebar Menu</h1>
    <p style="margin-top: 1rem; color: #666;">Animated sidebar with sections, labels, and active state. Uses CSS Grid structure with flexbox for layout.</p>
  </main>
</body>
</html>
