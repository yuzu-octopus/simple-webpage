<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Balance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; }

    h1 {
      font-size: 2rem;
      text-wrap: balance;
      margin-bottom: 2rem;
    }

    .unbalanced h1 { text-wrap: unset; }

    label { display: block; margin-bottom: 0.5rem; color: #666; }
    input[type="checkbox"] { margin-right: 0.5rem; }
  </style>
</head>
<body>
  <label>
    <input type="checkbox" id="toggle"> Show unbalanced version
  </label>

  <div class="unbalanced" id="preview">
    <h1>This Is a Heading That Might Break Ugly on Some Screens</h1>
  </div>

  <p style="margin-top: 2rem; color: #666; line-height: 1.6;">
    <code>text-wrap: balance</code> distributes line breaks more evenly. Only works for six wrapped lines or fewer. Toggle the checkbox to see the difference.
  </p>

  <script>
    document.getElementById('toggle').addEventListener('change', (e) => {
      document.getElementById('preview').classList.toggle('unbalanced', e.target.checked);
    });
  </script>
</body>
</html>
