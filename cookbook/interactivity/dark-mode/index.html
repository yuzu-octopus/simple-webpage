<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Toggle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-elevated: #f5f5f5;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --bg-elevated: #1e1e1e;
      --text: #e0e0e0;
      --text-muted: #999;
      --border: #333;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .container { max-width: 600px; margin: 0 auto; padding: 2rem; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .toggle {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1.25rem;
    }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .card h2 { margin-bottom: 0.5rem; }
    .card p { color: var(--text-muted); line-height: 1.6; }

    @media (prefers-reduced-motion: reduce) {
      body { transition: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toggle-row">
      <h1>Dark Mode</h1>
      <button class="toggle" id="dark-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
      <h2>Theme Switching</h2>
      <p>CSS custom properties change with <code>[data-theme="dark"]</code>. Theme persists via localStorage. Also respects <code>prefers-color-scheme</code> on first visit.</p>
    </div>
  </div>
  <script>
    const toggle = document.getElementById('dark-toggle');
    const root = document.documentElement;

    function getPreferredTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    setTheme(getPreferredTheme());

    toggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
