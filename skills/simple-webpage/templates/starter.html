<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Title</title>
  <!-- Path assumes starter.html is in templates/ — adjust when copying to project root -->
  <link rel="stylesheet" href="../tokens/index.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background: var(--color-bg);
    }

    h1 { font-size: var(--text-h1); line-height: var(--leading-h1); text-wrap: balance; }
    h2 { font-size: var(--text-h2); line-height: var(--leading-h2); text-wrap: balance; }
    h3 { font-size: var(--text-h3); line-height: var(--leading-h3); }

    .container {
      max-width: var(--max-width-wide);
      margin-inline: auto;
      padding-inline: var(--space-4);
    }

    a { color: var(--color-primary); }

    :focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Hello World</h1>
    <p>Start building here.</p>
  </main>
</body>
</html>
