<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; display: flex; min-height: 100vh; }

    .sidebar {
      width: 250px;
      background: #1a1a2e;
      color: #ccc;
      padding: 1.5rem;
      flex-shrink: 0;
    }
    .sidebar h2 { color: white; font-size: 1rem; margin-bottom: 1rem; }
    .sidebar a { display: block; color: #ccc; text-decoration: none; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.25rem; }
    .sidebar a:hover { background: rgba(255,255,255,0.1); color: white; }

    .main { flex: 1; padding: 2rem; background: #f5f5f5; }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h2>Menu</h2>
    <a href="#">Dashboard</a>
    <a href="#">Analytics</a>
    <a href="#">Settings</a>
    <a href="#">Profile</a>
  </aside>
  <main class="main">
    <h1>Sidebar Layout</h1>
    <p style="margin-top: 1rem; color: #666;">Flexbox sidebar with <code>flex-shrink: 0</code> to prevent collapse. Main content uses <code>flex: 1</code> to fill remaining space.</p>
  </main>
</body>
</html>
