<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }

    .hero {
      min-height: 80vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw + 1rem, 4rem);
      text-wrap: balance;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: clamp(1rem, 1vw + 0.5rem, 1.25rem);
      opacity: 0.9;
      max-width: 600px;
      margin-bottom: 2rem;
    }

    .hero-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
    }
    .hero-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <section class="hero">
    <div>
      <h1>Build Something Beautiful</h1>
      <p>Start with semantic HTML, add modern CSS, and ship without a build step.</p>
      <a href="#" class="hero-btn">Get Started</a>
    </div>
  </section>
</body>
</html>
