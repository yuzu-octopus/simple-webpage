<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }

    .dashboard {
      display: grid;
      grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
      grid-template-columns: 250px 1fr;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    .header {
      grid-area: header;
      background: #1a1a2e;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar {
      grid-area: sidebar;
      background: #16213e;
      color: #ccc;
      padding: 1rem;
    }
    .sidebar a {
      display: block;
      color: #ccc;
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 6px;
    }
    .sidebar a:hover { background: rgba(255,255,255,0.1); }

    .main {
      grid-area: main;
      padding: 2rem;
      background: #f5f5f5;
    }

    .footer {
      grid-area: footer;
      background: #1a1a2e;
      color: #999;
      padding: 1rem 1.5rem;
      text-align: center;
      font-size: 0.875rem;
    }

    @media (max-width: 768px) {
      .dashboard {
        grid-template-areas:
          "header"
          "main"
          "footer";
        grid-template-columns: 1fr;
      }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <header class="header">
      <h1>Dashboard</h1>
      <span>User</span>
    </header>
    <nav class="sidebar">
      <a href="#">Home</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
      <a href="#">Profile</a>
    </nav>
    <main class="main">
      <h2>Welcome back</h2>
      <p style="margin-top: 1rem; color: #666;">This dashboard uses <code>grid-template-areas</code> for named layout regions.</p>
    </main>
    <footer class="footer">© 2026 Dashboard</footer>
  </div>
</body>
</html>
