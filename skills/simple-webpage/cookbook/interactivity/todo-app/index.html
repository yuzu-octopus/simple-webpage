<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; }

    h1 { margin-bottom: 1.5rem; }

    .input-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .input-row input {
      flex: 1;
      padding: 0.625rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    .input-row input:focus { outline: 2px solid #667eea; outline-offset: -1px; border-color: transparent; }
    .input-row button {
      padding: 0.625rem 1rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .todo-item.done .todo-text { text-decoration: line-through; color: #999; }
    .todo-text { flex: 1; }
    .todo-delete { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 1.25rem; }
  </style>
</head>
<body>
  <h1>Todo App</h1>
  <div class="input-row">
    <input type="text" id="todo-input" placeholder="What needs to be done?">
    <button onclick="addTodo()">Add</button>
  </div>
  <ul class="todo-list" id="todo-list"></ul>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function save() { localStorage.setItem('todos', JSON.stringify(todos)); }

    function render() {
      const list = document.getElementById('todo-list');
      list.innerHTML = todos.map((t, i) => `
        <li class="todo-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
          <span class="todo-text">${t.text}</span>
          <button class="todo-delete" onclick="deleteTodo(${i})">×</button>
        </li>
      `).join('');
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      if (!input.value.trim()) return;
      todos.push({ text: input.value.trim(), done: false });
      input.value = '';
      save(); render();
    }

    function toggleTodo(i) { todos[i].done = !todos[i].done; save(); render(); }
    function deleteTodo(i) { todos.splice(i, 1); save(); render(); }

    document.getElementById('todo-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
