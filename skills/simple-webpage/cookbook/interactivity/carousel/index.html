<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }

    .carousel-wrapper { position: relative; }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 1rem;
      padding-bottom: 1rem;
      scroll-behavior: smooth;
    }

    .carousel-card {
      flex: 0 0 80%;
      scroll-snap-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 12px;
      padding: 2rem;
      min-height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    @media (min-width: 768px) {
      .carousel-card { flex: 0 0 45%; }
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      font-size: 1.25rem;
      z-index: 10;
    }
    .nav-btn.prev { left: 0.5rem; }
    .nav-btn.next { right: 0.5rem; }

    .dots { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; border: none; cursor: pointer; }
    .dot.active { background: #667eea; }
  </style>
</head>
<body>
  <h1 style="margin-bottom: 1rem;">Carousel</h1>
  <div class="carousel-wrapper">
    <button class="nav-btn prev" onclick="scrollCarousel(-1)">←</button>
    <div class="carousel" id="carousel">
      <div class="carousel-card"><h3>Slide 1</h3><p>Scroll or use arrows to navigate.</p></div>
      <div class="carousel-card"><h3>Slide 2</h3><p>scroll-snap-type ensures clean snapping.</p></div>
      <div class="carousel-card"><h3>Slide 3</h3><p>No JavaScript needed for basic behavior.</p></div>
      <div class="carousel-card"><h3>Slide 4</h3><p>Added JS for arrow navigation and dots.</p></div>
    </div>
    <button class="nav-btn next" onclick="scrollCarousel(1)">→</button>
  </div>
  <div class="dots" id="dots"></div>

  <script>
    const carousel = document.getElementById('carousel');
    const cards = carousel.querySelectorAll('.carousel-card');
    const dotsContainer = document.getElementById('dots');

    cards.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => cards[i].scrollIntoView({ behavior: 'smooth', inline: 'center' });
      dotsContainer.appendChild(dot);
    });

    function scrollCarousel(dir) {
      const card = carousel.querySelector('.carousel-card');
      carousel.scrollBy({ left: dir * card.offsetWidth + 16, behavior: 'smooth' });
    }

    carousel.addEventListener('scroll', () => {
      const scrollLeft = carousel.scrollLeft;
      const cardWidth = carousel.querySelector('.carousel-card').offsetWidth + 16;
      const active = Math.round(scrollLeft / cardWidth);
      dotsContainer.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === active));
    });
  </script>
</body>
</html>
