<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popover API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }

    [popover] {
      padding: 1.5rem;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-width: 300px;
    }

    [popover] h3 { margin-bottom: 0.5rem; }
    [popover] p { color: #666; line-height: 1.6; font-size: 0.875rem; }

    .btn {
      padding: 0.75rem 1.5rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1 style="margin-bottom: 1rem;">Popover API</h1>
  <p style="color: #666; margin-bottom: 1.5rem;">Click the button. No JavaScript needed for open/close. Click outside or press Escape to close.</p>

  <button class="btn" popovertarget="info-popover">Show Info</button>

  <div popover id="info-popover">
    <h3>Popover API</h3>
    <p>HTML <code>popover</code> attribute + <code>popovertarget</code>. The browser handles open/close, focus management, and dismiss on outside click or Escape.</p>
  </div>
</body>
</html>
