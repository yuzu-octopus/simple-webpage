<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Dialog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }

    .btn {
      padding: 0.75rem 1.5rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn:hover { background: #5a6fd6; }

    dialog {
      border: none;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 90%;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.3s, transform 0.3s, display 0.3s allow-discrete;
    }

    @starting-style {
      dialog { opacity: 0; transform: scale(0.95); }
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.5);
      opacity: 1;
      transition: opacity 0.3s, display 0.3s allow-discrete;
    }

    @starting-style {
      dialog::backdrop { opacity: 0; }
    }

    dialog h2 { margin-bottom: 0.75rem; }
    dialog p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }

    .dialog-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .btn-secondary { background: transparent; color: #666; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Modal Dialog</h1>
  <p style="margin: 1rem 0; color: #666;">Uses native <code>&lt;dialog&gt;</code> element. Focus trap is automatic. Press Escape to close.</p>
  <button class="btn" id="open-modal">Open Modal</button>

  <dialog id="modal">
    <h2>Confirm Action</h2>
    <p>This modal uses the native <code>&lt;dialog&gt;</code> element with <code>showModal()</code>. It handles focus trapping, Escape key, and backdrop clicking automatically.</p>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="this.closest('dialog').close()">Cancel</button>
      <button class="btn" onclick="this.closest('dialog').close('confirm')">Confirm</button>
    </div>
  </dialog>

  <script>
    const modal = document.getElementById('modal');
    document.getElementById('open-modal').addEventListener('click', () => modal.showModal());

    modal.addEventListener('close', () => {
      if (modal.returnValue === 'confirm') {
        console.log('User confirmed');
      }
    });
  </script>
</body>
</html>
