<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tabs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; }

    .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 1rem; }
    .tabs input[type="radio"] { display: none; }
    .tabs label {
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      color: #999;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tabs input[type="radio"]:checked + label {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content { display: none; padding: 1rem 0; }
    #tab1:checked ~ .panel-1,
    #tab2:checked ~ .panel-2,
    #tab3:checked ~ .panel-3 { display: block; }

    .panel { line-height: 1.6; color: #555; }
  </style>
</head>
<body>
  <div class="tabs">
    <input type="radio" name="tabs" id="tab1" checked>
    <label for="tab1">Tab 1</label>
    <input type="radio" name="tabs" id="tab2">
    <label for="tab2">Tab 2</label>
    <input type="radio" name="tabs" id="tab3">
    <label for="tab3">Tab 3</label>
  </div>

  <div class="panel panel-1"><p>Content for tab 1. Uses <code>:checked</code> pseudo-class to show/hide panels.</p></div>
  <div class="panel panel-2"><p>Content for tab 2. No JavaScript needed — pure CSS tab switching.</p></div>
  <div class="panel panel-3"><p>Content for tab 3. Radio buttons ensure only one tab is active at a time.</p></div>
</body>
</html>
