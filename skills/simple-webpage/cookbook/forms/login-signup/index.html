<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Signup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: #f5f5f5; }

    .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 90%; max-width: 400px; }
    .card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.375rem; font-weight: 500; font-size: 0.875rem; }
    .form-group input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    .form-group input:focus { outline: 2px solid #667eea; outline-offset: -1px; border-color: transparent; }
    .error { color: #dc2626; font-size: 0.8rem; margin-top: 0.25rem; display: block; }

    .btn { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
    .btn:hover { background: #5a6fd6; }

    .toggle { text-align: center; margin-top: 1rem; font-size: 0.875rem; }
    .toggle a { color: #667eea; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="form-title">Login</h1>
    <form id="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" inputmode="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="toggle">
      Don't have an account? <a id="toggle-mode">Sign up</a>
    </div>
  </div>
  <script>
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const toggle = document.getElementById('toggle-mode');
    let isLogin = true;

    toggle.addEventListener('click', () => {
      isLogin = !isLogin;
      title.textContent = isLogin ? 'Login' : 'Sign Up';
      toggle.textContent = isLogin ? 'Sign up' : 'Login';
      form.querySelector('.btn').textContent = isLogin ? 'Login' : 'Sign Up';
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      form.querySelectorAll('.error').forEach(el => el.remove());
      const email = form.querySelector('#email');
      const password = form.querySelector('#password');

      if (!email.value.includes('@')) {
        email.insertAdjacentHTML('afterend', '<span class="error">Enter a valid email</span>');
        return;
      }
      if (password.value.length < 8) {
        password.insertAdjacentHTML('afterend', '<span class="error">Min 8 characters</span>');
        return;
      }
      alert(isLogin ? 'Logging in...' : 'Creating account...');
    });
  </script>
</body>
</html>
