<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; }

    h1 { margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.375rem; font-weight: 500; font-size: 0.875rem; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group input:focus, .form-group textarea:focus { outline: 2px solid #667eea; outline-offset: -1px; border-color: transparent; }
    .btn { padding: 0.75rem 1.5rem; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <h1>Contact Us</h1>
  <form>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" autocomplete="name" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" inputmode="email" required>
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" required></textarea>
    </div>
    <button type="submit" class="btn">Send Message</button>
  </form>
</body>
</html>
