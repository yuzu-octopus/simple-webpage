<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Hamburger Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 3.5rem;
      background: #1a1a2e;
      color: white;
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 1rem;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
    }
    .nav-links a:hover { color: white; background: rgba(255,255,255,0.1); }

    @media (max-width: 768px) {
      .menu-btn { display: block; }

      .nav-links {
        display: none;
        position: absolute;
        top: 3.5rem;
        left: 0;
        right: 0;
        flex-direction: column;
        background: #1a1a2e;
        padding: 1rem;
        gap: 0.5rem;
      }

      .nav-links.open { display: flex; }
    }
  </style>
</head>
<body>
  <nav>
    <span style="font-weight: 700;">Brand</span>
    <button class="menu-btn" aria-expanded="false" aria-label="Toggle menu">☰</button>
    <ul class="nav-links" aria-hidden="true">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <main style="padding: 2rem;">
    <h1>Mobile Hamburger</h1>
    <p>ARIA-accessible toggle with <code>aria-expanded</code> and <code>aria-hidden</code>. Resize to see hamburger appear.</p>
  </main>
  <script>
    const btn = document.querySelector('.menu-btn');
    const links = document.querySelector('.nav-links');

    btn.addEventListener('click', () => {
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      btn.textContent = expanded ? '☰' : '✕';
      links.classList.toggle('open');
      links.setAttribute('aria-hidden', String(expanded));
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('nav')) {
        btn.setAttribute('aria-expanded', 'false');
        btn.textContent = '☰';
        links.classList.remove('open');
        links.setAttribute('aria-hidden', 'true');
      }
    });
  </script>
</body>
</html>
