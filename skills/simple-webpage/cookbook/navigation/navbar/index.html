<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }

    nav {
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      height: 3.5rem;
      background: #1a1a2e;
      color: white;
    }

    .logo { font-weight: 700; font-size: 1.25rem; }

    nav ul {
      display: flex;
      list-style: none;
      gap: 1rem;
      margin-left: auto; /* Push remaining items right */
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
    }
    nav a:hover { color: white; background: rgba(255,255,255,0.1); }

    /* Push last item to far right */
    nav ul li:last-child { margin-left: auto; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">Brand</span>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">Sign In</a></li>
    </ul>
  </nav>
  <main style="padding: 2rem;">
    <h1>Flexbox Navbar</h1>
    <p>Uses <code>margin-left: auto</code> to push nav items to the right. The logo stays left, links go right.</p>
  </main>
</body>
</html>
