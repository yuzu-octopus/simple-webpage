<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumbs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }

    nav[aria-label="breadcrumb"] ol {
      list-style: none;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    nav[aria-label="breadcrumb"] li:not(:last-child)::after {
      content: '/';
      margin-left: 0.5rem;
      color: #999;
    }

    nav[aria-label="breadcrumb"] a {
      color: #667eea;
      text-decoration: none;
    }
    nav[aria-label="breadcrumb"] a:hover { text-decoration: underline; }

    nav[aria-label="breadcrumb"] [aria-current="page"] {
      color: #333;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <nav aria-label="breadcrumb">
    <ol>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Electronics</a></li>
      <li><span aria-current="page">Headphones</span></li>
    </ol>
  </nav>
  <main style="margin-top: 1.5rem;">
    <h1>Breadcrumbs</h1>
    <p style="color: #666; margin-top: 0.5rem;">Semantic <code>&lt;nav&gt;</code> with <code>aria-label="breadcrumb"</code>. Separator via <code>::after</code> pseudo-element.</p>
  </main>
</body>
</html>
