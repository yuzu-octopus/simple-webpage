<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: #f5f5f5; }

    .article-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 320px;
      width: 90%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }

    .article-image {
      height: 180px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: grid;
      place-items: center;
      color: white;
      font-size: 2.5rem;
    }

    .article-content { padding: 1.25rem; }
    .article-content h2 { font-size: 1.1rem; margin-bottom: 0.5rem; line-height: 1.3; }
    .article-content p { color: #666; font-size: 0.875rem; line-height: 1.5; margin-bottom: 1rem; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: #999;
    }
    .article-meta .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e0e0e0;
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      color: #666;
    }
  </style>
</head>
<body>
  <article class="article-card">
    <div class="article-image">📄</div>
    <div class="article-content">
      <h2>Building with Modern CSS</h2>
      <p>How to use container queries, :has(), and scroll-driven animations in production websites.</p>
      <div class="article-meta">
        <div class="avatar">A</div>
        <span>Alex Chen</span>
        <span>·</span>
        <span>5 min read</span>
      </div>
    </div>
  </article>
</body>
</html>
