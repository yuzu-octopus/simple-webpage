<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Effects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; min-height: 100vh; align-items: center; background: #f5f5f5; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 200px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .card-scale {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 200px;
      text-align: center;
      transition: transform 0.3s;
    }
    .card-scale:hover { transform: scale(1.05); }

    .card-glow {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 200px;
      text-align: center;
      transition: box-shadow 0.3s;
    }
    .card-glow:hover { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }

    h3 { margin-bottom: 0.5rem; }
    p { color: #666; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <h3>Lift</h3>
    <p>translateY(-4px)</p>
  </div>
  <div class="card-scale">
    <h3>Scale</h3>
    <p>scale(1.05)</p>
  </div>
  <div class="card-glow">
    <h3>Glow</h3>
    <p>box-shadow</p>
  </div>
</body>
</html>
