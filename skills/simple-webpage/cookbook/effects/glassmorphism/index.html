<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      color: white;
      max-width: 400px;
      width: 90%;
    }

    .glass h2 { margin-bottom: 0.75rem; }
    .glass p { opacity: 0.9; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="glass">
    <h2>Glassmorphism</h2>
    <p>Frosted glass effect using <code>backdrop-filter: blur()</code> with a semi-transparent background. Requires a visible background behind the element.</p>
  </div>
</body>
</html>
