<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphism</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #e0e0e0;
    }

    .neumorphic {
      background: #e0e0e0;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 8px 8px 15px #bebebe, -8px -8px 15px #ffffff;
      max-width: 350px;
      width: 90%;
      text-align: center;
    }

    .neumorphic:active {
      box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
    }

    .neumorphic h2 { margin-bottom: 0.75rem; color: #333; }
    .neumorphic p { color: #666; line-height: 1.6; }

    .neu-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #e0e0e0;
      border: none;
      border-radius: 8px;
      box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff;
      cursor: pointer;
      font-size: 1rem;
      color: #333;
    }
    .neu-btn:active {
      box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff;
    }
  </style>
</head>
<body>
  <div class="neumorphic">
    <h2>Neumorphism</h2>
    <p>Soft UI effect using two opposing box-shadows on a matching background color.</p>
    <button class="neu-btn">Press Me</button>
  </div>
</body>
</html>
