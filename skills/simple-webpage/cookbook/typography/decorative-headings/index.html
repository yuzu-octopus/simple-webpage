<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decorative Headings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }

    .gradient-heading {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2, #ee5a6f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
    }

    .outline-heading {
      font-size: 2.5rem;
      font-weight: 800;
      -webkit-text-stroke: 2px #667eea;
      color: transparent;
      margin-bottom: 2rem;
    }

    .shadow-heading {
      font-size: 2.5rem;
      font-weight: 800;
      color: #667eea;
      text-shadow: 3px 3px 0 #764ba2;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <h1 class="gradient-heading">Gradient Heading</h1>
  <h1 class="outline-heading">Outline Heading</h1>
  <h1 class="shadow-heading">Shadow Heading</h1>
</body>
</html>
