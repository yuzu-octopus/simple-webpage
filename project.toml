[brand]
tagline = "SKILL.md · HTML · CSS · JS · Design Tokens"

[[sections]]
id = "about"
title = "About"
icon = "info"
type = "text"
body = """<p>simple-webpage is a vanilla HTML/CSS/JS reference repository and reusable OpenCode agent skill. No frameworks, no build steps, no bloat.</p><p>Inspired by 37signals (Campfire/Writebook), Coding2GO, and the ponytail YAGNI philosophy.</p>"""

[[sections]]
id = "features"
title = "What's Inside"
icon = "grid"
type = "features"

[[sections.items]]
title = "SKILL.md (1,800+ lines)"
body = "Comprehensive agent skill with philosophy, decision framework, HTML/CSS/JS patterns, framework allowlist, anti-patterns, and accessibility minimums."

[[sections.items]]
title = "Cookbook (40+ patterns)"
body = "Standalone HTML demos for layouts, navigation, forms, cards, effects, interactivity, and typography."

[[sections.items]]
title = "Design Tokens"
body = "4-layer token system: base, semantic, components, typography. Import via a single link tag."

[[sections.items]]
title = "Documentation"
body = "Principles, component specs, guides (modern CSS, accessibility, dark mode, responsive, animations), and tutorials."

[[sections.items]]
title = "Framework Allowlist"
body = "18+ curated CSS frameworks: classless, shadcn-aesthetic, minimal-class, Tailwind-based, and effect libraries."

[[sections.items]]
title = "Modern CSS"
body = "OKLCH colors, nesting, @layer, :has(), clamp(), container queries, scroll-snap, anchor positioning, View Transitions."

[[sections]]
