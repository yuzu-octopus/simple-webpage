[project]
name = "simple-webpage"
tagline = "Vanilla HTML/CSS/JS — No frameworks, no build steps, no bloat"
subtitle = "A comprehensive reference repository and OpenCode agent skill for building modern webpages with vanilla HTML, CSS, and JavaScript."
description = "1,657-line SKILL.md with 47 cookbook patterns, design tokens, and 250+ CSS techniques. Build webpages with vanilla HTML/CSS/JS — no frameworks, no build steps."
page_url = "https://yuzu-octopus.github.io/simple-webpage/"
github_url = "https://github.com/yuzu-octopus/simple-webpage"
logo_svg = """<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
<rect width="64" height="64" rx="14" fill="var(--panel)"/>
<polyline points="18 16 8 32 18 48" stroke="var(--purple)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="46 16 56 32 46 48" stroke="var(--purple)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="40" y1="48" x2="24" y2="16" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"/>
</svg>"""

[brand]
tagline = "SKILL.md · HTML · CSS · JS · Design Tokens"

[[sections]]
id = "about"
title = "About"
icon = "info"
type = "text"
body = """<p>simple-webpage is a vanilla HTML/CSS/JS reference repository and reusable OpenCode agent skill. No frameworks, no build steps, no bloat.</p><p>Inspired by 37signals (Campfire/Writebook), Coding2GO, and the ponytail YAGNI philosophy.</p>"""

[[sections]]
id = "features"
title = "What's Inside"
icon = "grid"
type = "features"

[[sections.items]]
title = "SKILL.md (1,657 lines)"
body = "Comprehensive agent skill with philosophy, decision framework, HTML/CSS/JS patterns, framework allowlist, anti-patterns, and accessibility minimums."

[[sections.items]]
title = "Cookbook (47 patterns)"
body = "Standalone HTML demos for layouts, navigation, forms, cards, effects, interactivity, and typography."

[[sections.items]]
title = "Design Tokens"
body = "4-layer token system: base, semantic, components, typography. Import via a single link tag."

[[sections.items]]
title = "Documentation"
body = "Principles, component specs, guides (modern CSS, accessibility, dark mode, responsive, animations), and tutorials."

[[sections.items]]
title = "Framework Allowlist"
body = "18+ curated CSS frameworks: classless, shadcn-aesthetic, minimal-class, Tailwind-based, and effect libraries."

[[sections.items]]
title = "Modern CSS"
body = "OKLCH colors, nesting, @layer, :has(), clamp(), container queries, scroll-snap, anchor positioning, View Transitions."

