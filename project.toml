[project]
name = "simple-webpage"
tagline = "Vanilla HTML/CSS/JS — No frameworks, no build steps, no bloat"
description = "A comprehensive reference repository and OpenCode agent skill for building webpages with vanilla HTML, CSS, and JavaScript. 1,700+ lines of patterns, 30+ cookbook demos, modern CSS techniques, and a reusable SKILL.md for AI agents."
page_url = "https://yuzu-octopus.github.io/simple-webpage/"
github_url = "https://github.com/yuzu-octopus/simple-webpage"
quickstart_url = "https://github.com/yuzu-octopus/simple-webpage#quick-start"
