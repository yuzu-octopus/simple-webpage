[project]
name = "simple-webpage"
tagline = "Vanilla HTML/CSS/JS — No frameworks, no build steps, no bloat"
subtitle = "A comprehensive reference repository and OpenCode agent skill for building modern webpages with vanilla HTML, CSS, and JavaScript."
description = "1,796-line SKILL.md with 42 cookbook patterns, design tokens, and 250+ CSS techniques. Build webpages with vanilla HTML/CSS/JS — no frameworks, no build steps."
page_url = "https://yuzu-octopus.github.io/simple-webpage/"
github_url = "https://github.com/yuzu-octopus/simple-webpage"
quickstart_url = "https://github.com/yuzu-octopus/simple-webpage#quick-start"
