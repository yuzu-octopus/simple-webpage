[brand]
tagline = "Built by yuzu-octopus"

[[sections]]
id = "about"
title = "About"
icon = "info"
type = "text"
body = """
<p>simple-webpage is a vanilla HTML/CSS/JS reference repository and reusable OpenCode agent skill. No frameworks, no build steps, no bloat.</p>
<p>Inspired by 37signals (Campfire/Writebook), Coding2GO, and the ponytail YAGNI philosophy — modern CSS is powerful enough that most projects don't need React, Tailwind, or any build tool.</p>
"""

[[sections]]
id = "features"
title = "What's Inside"
icon = "grid"
type = "features"

[[sections.items]]
title = "SKILL.md (1,700+ lines)"
body = "Comprehensive agent skill with philosophy, decision framework, HTML/CSS/JS patterns, framework allowlist, anti-patterns, and accessibility minimums."

[[sections.items]]
title = "Cookbook (30+ patterns)"
body = "Standalone HTML demos for layouts, navigation, forms, cards, effects, interactivity, and typography. Open in browser, copy into your project."

[[sections.items]]
title = "Design Tokens"
body = "4-layer token system: base (raw values) → semantic (meaningful names) → components (UI-specific) → typography (fluid scale)."

[[sections.items]]
title = "Documentation"
body = "Principles, component specs, guides (modern CSS, accessibility, dark mode, responsive, animations), and step-by-step tutorials."

[[sections.items]]
title = "Framework Allowlist"
body = "18+ curated CSS frameworks across 5 categories: classless, shadcn-aesthetic, minimal-class, Tailwind-based, and effect libraries."

[[sections.items]]
title = "Modern CSS"
body = "OKLCH colors, nesting, @layer, :has(), clamp(), container queries, scroll-snap, anchor positioning, View Transitions, and more."

[[sections]]
id = "techniques"
title = "Techniques Covered"
icon = "layers"
type = "stack"

[[sections.items]]
name = "HTML"
body = "Semantic elements, dialog, details, popover, ARIA, tables, forms"

[[sections.items]]
name = "CSS"
body = "Nesting, @layer, :has, clamp, container queries, OKLCH, subgrid"

[[sections.items]]
name = "JS"
body = "DOM, localStorage, async/await, event delegation, ES modules"

[[sections.items]]
name = "Effects"
body = "Glassmorphism, neumorphism, gradient text, scroll-snap, animations"

[[sections.items]]
name = "Accessibility"
body = "Focus-visible, prefers-reduced-motion, ARIA, semantic HTML"

[[sections]]
id = "getting-started"
title = "Getting Started"
icon = "play"
type = "steps"

[[sections.items]]
title = "1. Browse the cookbook"
body = "Open any file in skills/simple-webpage/cookbook/ in your browser."

[[sections.items]]
title = "2. Copy patterns"
body = "Grab the HTML/CSS you need and paste into your project."

[[sections.items]]
title = "3. Customize tokens"
body = "Override CSS custom properties from tokens/ to match your brand."

[[sections.items]]
title = "4. Load the skill"
body = "Add SKILL.md to your OpenCode config for AI-assisted development."

[[sections]]
id = "stack"
title = "Tech Stack"
icon = "chip"
type = "stack"

[[sections.items]]
name = "HTML5"
body = "Semantic markup, no frameworks"

[[sections.items]]
name = "CSS3"
body = "Modern features, no preprocessor"

[[sections.items]]
name = "Vanilla JS"
body = "No React, Vue, or build tools"

[[sections.items]]
name = "Zero Dependencies"
body = "No npm, no node_modules"
